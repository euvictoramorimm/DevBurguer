<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | DevBurger</title>
    <link rel="stylesheet" href="../../css/global.css">
</head>
<body>
    <header>
        <h1>🛠️ SYSTEM OVERRIDE</h1>
        <nav>
            <a href="../index.html" style="color: var(--cyber-pink);">[VOLTAR PARA A REDE]</a>
        </nav>
    </header>

    <main class="admin-grid">
        <section class="form-section">
            <h2>MODIFICAR DADOS</h2>
            <form id="product-form">
                <input type="hidden" id="productId"> <label>Nome do Arquivo (Lanche):</label>
                <input type="text" id="name" placeholder="Ex: CyberBurger" required>
                
                <label>Especificações (Ingredientes):</label>
                <textarea id="description" placeholder="Ex: Pão neon, carne sintética..." rows="3"></textarea>
                
                <label>Valor de Troca (E$):</label>
                <input type="number" id="price" step="0.01" placeholder="Ex: 45.00" required>
                
                <label>Link do Holograma (URL Imagem):</label>
                <input type="url" id="imageUrl" placeholder="http://imagem.com/foto.jpg">
                
                <button type="submit" id="submit-btn">UPLOAD TO GRID</button>
                <button type="button" id="cancel-btn" class="delete-btn" style="display:none;" onclick="resetForm()">CANCELAR</button>
            </form>
            <div id="status-message" style="margin-top: 15px;"></div>
        </section>

        <section class="list-section">
            <h2>INVENTÁRIO ATUAL</h2>
            <div id="admin-product-list">
                <p>Procurando dados na rede...</p>
            </div>
        </section>
    </main>

    <script src="../../js/api.js"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
